# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMono Nerd Font' postscript_name=JetBrainsMonoNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS


# BEGIN_KITTY_THEME
# Catppuccin-Frappe
include current-theme.conf
# END_KITTY_THEME

window_padding_width 10 10 12 10

# Kitty Opacity & Blur
background_opacity         0.7
background_blur 1
dynamic_background_opacity yes

# Gtk options
hide_window_decorations yes

# Other options
enable_audio_bell no

# Shell options
shell zsh --login
