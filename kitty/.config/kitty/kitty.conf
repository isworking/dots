font_family      Cascadia Code
bold_font        Cascadia Code
italic_font      Cascadia Code
bold_italic_font Cascadia Code


# BEGIN_KITTY_THEME
# Catppuccin-Frappe
include current-theme.conf
# END_KITTY_THEME

window_padding_width 10 10 12 10

# Kitty Opacity & Blur
background_opacity         0.7
background_blur 1
dynamic_background_opacity yes

# Gtk options
hide_window_decorations yes

# Other options
enable_audio_bell no

# Shell options
shell zsh --login

protocol file
mime text/*
action run emacsclient -c {path}
